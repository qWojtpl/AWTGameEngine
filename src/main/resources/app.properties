
# Set main scene path.

main=scenes/performance/vehicle.xml

# Set default window title.

title=AWTGameEngine

# Set application icon path in resources folder.

icon=sprites/beaver.jpg

# Enable or disable splash screen.
# This is a swing-based window, which works outside the main engine.
# Splash screen window will appear during creation of default window.

splashScreen=true
splashScreenWidth=400
splashScreenHeight=200
splashScreenColor=rgba(255,255,255,230)

# Configure splash screen behavior.
# Splash screen is divided into columns and rows.
# Every cell is separated by a comma.
# Use {LOGGER} to get real-time logger in splash screen.
# Use * after the string to set the font size.
# Start a string with /, to get a sprite.

splashScreenColumns=3
splashScreenRows=3
splashScreenContent=,Loading*20,,,{LOGGER}*10,,,/sprites/base/opengl_logo.png,

# Set render engine
# Available render engines:
# - default - uses default rendering methods (AWT + Swing)
# - web - uses JavaFX's WebView rendering (HTML + CSS), you can use JavaScript
# - opengl - uses OpenGL to render 3D (recommended)
# For graphics-based applications (for example 2D games with only
# sprites) it is highly recommended to use default render engine.
# If you're creating something like editor or another static app,
# where you want to use custom CSS etc., you can use web rendering.

renderEngine=opengl

# Set if the build is a server. In server mode no window will be shown - only a console.

server=false

# When set to true, editor segments will be available

editorMode=true

# Set path for WebView initialization files

webViewPath=webview/

# When set to true all new windows by default will run in fullscreen mode.
# Possible values: true or false

fullscreen=false

# Set default render FPS and update FPS for scene

renderFps=60
updateFps=60

# Set FPS for simulation running. The optimal value is 360, values
# below this number can cause physics simulation to jitter.
# Higher values = better physics results.

physicsFps=360

# If set to true all elements will fit to have the same size on all screens

sameSize=true

# Set preference coding and decoding shift.

preferenceShift=32

# Set default font for default rendering engine.
# Default: sans-serif with size 18

font=sans-serif
fontSize=18

# Set log sensitivity.
# 0 - disabled
# 1 - info
# 2 - info and errors
# 3 - info, errors and warnings
logLevel=3

# If set to true every log line will contain a caller class,
# which means class name from where log was sent.
logCallerClass=true

# If set to true then all logs are stored in logs.log file.
# To save logs in log file logging must be turned on.
logFile=true
logFileName=logs.log