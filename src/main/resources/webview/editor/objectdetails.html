<div class="standard object-details">
    <div>
        <label for="objectdetails-identifier">Identifier</label>
        <input type="text" id="objectdetails-identifier" placeholder="Identifier..." value="{{id}}">
        <h2>Position</h2><br>
        <label for="objectdetails-position-x">X</label><input type="text" id="objectdetails-position-x" placeholder="X" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'pos.x:' + this.value);"><br>
        <label for="objectdetails-position-y">Y</label><input type="text" id="objectdetails-position-y" placeholder="Y" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'pos.y:' + this.value);"><br>
        <label for="objectdetails-position-z">Z</label><input type="text" id="objectdetails-position-z" placeholder="Z" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'pos.z:' + this.value);"><br>
        <h2>Size</h2><br>
        <label for="objectdetails-size-x">X</label><input type="text" id="objectdetails-size-x" placeholder="X" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'size.x:' + this.value);"><br>
        <label for="objectdetails-size-y">Y</label><input type="text" id="objectdetails-size-y" placeholder="Y" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'size.y:' + this.value);"><br>
        <label for="objectdetails-size-z">Z</label><input type="text" id="objectdetails-size-z" placeholder="Z" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'size.z:' + this.value);"><br>
        <h2>Rotation</h2><br>
        <label for="objectdetails-rotation-x">X</label><input type="text" id="objectdetails-rotation-x" placeholder="X" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'rotation.x:' + this.value);"><br>
        <label for="objectdetails-rotation-y">Y</label><input type="text" id="objectdetails-rotation-y" placeholder="Y" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'rotation.y:' + this.value);"><br>
        <label for="objectdetails-rotation-z">Z</label><input type="text" id="objectdetails-rotation-z" placeholder="Z" oninput="validateInputNumber(this)" onchange="feedback('objects-hierarchy', 'pl.AWTGameEngineEditor.components.ObjectsHierarchy', 'rotation.z:' + this.value);"><br>
        <label>Quaternion?</label><input type="checkbox">
        <label for="objectdetails-rotation-w">W</label><input type="text" id="objectdetails-rotation-w" placeholder="W" oninput="validateInputNumber(this)"><br>
    </div>
    <div>

    </div>
</div>
